name: Bug Report
description: Report a reproducible problem in KnowledgeFlow StudyAgent.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest steps that reproduce the bug.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: affected-area
    attributes:
      label: Affected Area
      description: For example frontend, agent-prompts, docs, CI, Harness.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, npm version, browser, and StudyAgent version or commit.
      placeholder: |
        - OS:
        - Node:
        - npm:
        - Browser:
        - StudyAgent:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste relevant logs or screenshots. Remove secrets before posting.
    validations:
      required: false
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this bug.
          required: false

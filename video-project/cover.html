<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowledgeFlow 视频封面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-bg: #0a0e27;
      --dark-bg2: #050810;
      --stress-red: #ef4444;
      --brand-blue: #3b82f6;
      --accent-yellow: #fbbf24;
      --accent-gold: #f59e0b;
      --text-white: #ffffff;
      --text-dim: rgba(255,255,255,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Noto Sans SC', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .cover {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background: var(--dark-bg);
    }

    /* === Background Layers === */
    .bg-gradient {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 20%, rgba(239,68,68,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 80%, rgba(59,130,246,0.2) 0%, transparent 60%),
        linear-gradient(180deg, #0a0e27 0%, #0f172a 50%, #050810 100%);
    }

    .bg-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    .bg-noise {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
    }

    /* === Top Badge === */
    .top-badge {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 100px;
      backdrop-filter: blur(10px);
    }
    .top-badge .dot {
      width: 12px; height: 12px;
      background: var(--stress-red);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--stress-red);
    }
    .top-badge .text {
      color: var(--stress-red);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* === Main Hook Text === */
    .hook-section {
      position: absolute;
      top: 200px;
      left: 0; right: 0;
      text-align: center;
      padding: 0 60px;
    }
    .hook-line1 {
      font-size: 88px;
      font-weight: 900;
      color: var(--text-white);
      line-height: 1.2;
      text-shadow: 0 4px 30px rgba(0,0,0,0.8);
      letter-spacing: -2px;
    }
    .hook-line2 {
      font-size: 120px;
      font-weight: 900;
      color: var(--stress-red);
      line-height: 1.1;
      text-shadow:
        0 0 40px rgba(239,68,68,0.6),
        0 0 80px rgba(239,68,68,0.3),
        0 4px 20px rgba(0,0,0,0.8);
      letter-spacing: -4px;
      margin-top: 20px;
    }
    .hook-line2 .underline {
      display: inline-block;
      position: relative;
    }
    .hook-line2 .underline::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0; right: 0;
      height: 6px;
      background: var(--stress-red);
      border-radius: 3px;
      box-shadow: 0 0 20px var(--stress-red);
    }

    /* === Center Visual === */
    .center-visual {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -45%);
      width: 900px;
    }

    .screenshot-container {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      box-shadow:
        0 0 0 3px rgba(59,130,246,0.4),
        0 0 80px rgba(59,130,246,0.3),
        0 30px 100px rgba(0,0,0,0.7);
    }
    .screenshot-container img {
      width: 100%;
      display: block;
    }
    .screenshot-container::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(10,14,39,0.8) 100%);
      pointer-events: none;
    }

    /* Floating UI elements around screenshot */
    .float-badge {
      position: absolute;
      padding: 16px 28px;
      border-radius: 20px;
      font-size: 32px;
      font-weight: 700;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .float-badge-1 {
      top: -30px;
      right: -40px;
      background: rgba(251,191,36,0.95);
      color: var(--dark-bg);
      transform: rotate(8deg);
    }
    .float-badge-2 {
      bottom: 80px;
      left: -50px;
      background: rgba(59,130,246,0.95);
      color: var(--text-white);
      transform: rotate(-5deg);
    }
    .float-badge-3 {
      top: 40%;
      right: -60px;
      background: rgba(255,255,255,0.95);
      color: var(--dark-bg);
      transform: rotate(6deg);
    }

    /* === Brand Section === */
    .brand-section {
      position: absolute;
      bottom: 380px;
      left: 0; right: 0;
      text-align: center;
    }
    .brand-name {
      font-size: 96px;
      font-weight: 900;
      color: var(--text-white);
      letter-spacing: -3px;
      text-shadow:
        0 0 60px rgba(59,130,246,0.8),
        0 0 120px rgba(59,130,246,0.4);
      line-height: 1;
    }
    .brand-tagline {
      font-size: 42px;
      font-weight: 700;
      color: var(--accent-yellow);
      margin-top: 24px;
      text-shadow: 0 0 30px rgba(251,191,36,0.5);
      letter-spacing: 1px;
    }

    /* === Feature Pills === */
    .feature-pills {
      position: absolute;
      bottom: 240px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      width: 90%;
    }
    .pill {
      padding: 14px 28px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      color: var(--text-white);
      font-size: 28px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
    .pill .icon {
      margin-right: 8px;
    }

    /* === Bottom CTA === */
    .bottom-cta {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
    }
    .cta-text {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 2px;
    }
    .cta-text .arrow {
      color: var(--accent-yellow);
      font-size: 40px;
    }

    /* === Decorative Elements === */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }
    .glow-orb-1 {
      top: 15%;
      left: -10%;
      width: 400px; height: 400px;
      background: rgba(239,68,68,0.2);
    }
    .glow-orb-2 {
      bottom: 20%;
      right: -10%;
      width: 500px; height: 500px;
      background: rgba(59,130,246,0.2);
    }
    .glow-orb-3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: rgba(251,191,36,0.08);
    }

    /* === Code-style accent === */
    .code-accent {
      position: absolute;
      top: 140px;
      right: 60px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      color: rgba(59,130,246,0.4);
      font-weight: 400;
    }
    .code-accent-2 {
      position: absolute;
      bottom: 160px;
      left: 60px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      color: rgba(251,191,36,0.3);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="cover" id="cover">

    <!-- Background Layers -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>

    <!-- Glow Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>

    <!-- Code Accents -->
    <div class="code-accent">// AI_POWERED</div>
    <div class="code-accent-2">/* STUDY_SMARTER */</div>

    <!-- Top Badge -->
    <div class="top-badge">
      <div class="dot"></div>
      <div class="text">期末急救</div>
    </div>

    <!-- Hook Text -->
    <div class="hook-section">
      <div class="hook-line1">期末复习看了一晚上</div>
      <div class="hook-line2">
        <span class="underline">还是啥也不会？</span>
      </div>
    </div>

    <!-- Center Visual: Product Screenshot -->
    <div class="center-visual">
      <div class="screenshot-container">
        <img src="assets/screenshots/study.png" alt="KnowledgeFlow 产品截图" />
      </div>
      <!-- Floating badges -->
      <div class="float-badge float-badge-1">✨ AI 讲解</div>
      <div class="float-badge float-badge-2">📊 智能计划</div>
      <div class="float-badge float-badge-3">🎯 精准练习</div>
    </div>

    <!-- Brand Section -->
    <div class="brand-section">
      <div class="brand-name">KnowledgeFlow</div>
      <div class="brand-tagline">AI 帮你从零搞定期末</div>
    </div>

    <!-- Feature Pills -->
    <div class="feature-pills">
      <div class="pill"><span class="icon">✅</span>学习计划</div>
      <div class="pill"><span class="icon">✅</span>知识点讲解</div>
      <div class="pill"><span class="icon">✅</span>智能练习</div>
      <div class="pill"><span class="icon">✅</span>学习统计</div>
    </div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <div class="cta-text">点击体验 <span class="arrow">→</span></div>
    </div>

  </div>
</body>
</html>
